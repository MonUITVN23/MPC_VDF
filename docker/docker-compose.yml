version: "3.9"

services:
  # MPC Node 1 (of 4 in default 3-of-4 config)
  node-1:
    build: ./nodes
    environment:
      - NODE_ID=1
      - TOTAL_NODES=4
      - THRESHOLD=3
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
    ports:
      - "8001:8000"

  # MPC Node 2
  node-2:
    build: ./nodes
    environment:
      - NODE_ID=2
      - TOTAL_NODES=4
      - THRESHOLD=3
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
    ports:
      - "8002:8000"

  # MPC Node 3
  node-3:
    build: ./nodes
    environment:
      - NODE_ID=3
      - TOTAL_NODES=4
      - THRESHOLD=3
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
    ports:
      - "8003:8000"

  # MPC Node 4 (VDF Executor node)
  node-4:
    build: ./nodes
    environment:
      - NODE_ID=4
      - TOTAL_NODES=4
      - THRESHOLD=3
      - IS_EXECUTOR=true
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
      - AMOY_RPC_URL=${AMOY_RPC_URL}
      - AXELAR_API_KEY=${AXELAR_API_KEY}
    ports:
      - "8004:8000"
